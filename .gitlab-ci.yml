stages:
  - deploy

pages:
  stage: deploy
  image: node:20-alpine
  script:
    - npm run build
    - mkdir -p public
    - cp -R 404.html index.html @bongdal-universe-comics assets data docs webtoon README.md package.json vercel.json .nojekyll public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
